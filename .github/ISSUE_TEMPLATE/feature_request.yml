name: ✨ Feature Request
description: Suggest a new feature for Anion
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Suggest a feature you'd like to see in Anion. Please be specific about the use case.

  - type: textarea
    id: feature
    attributes:
      label: Feature Description
      description: What feature would you like?
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem It Solves
      description: What problem does this feature address?
    validations:
      required: true

  - type: textarea
    id: behavior
    attributes:
      label: Proposed Behavior
      description: How should the feature work from a user perspective?

  - type: input
    id: environment
    attributes:
      label: Linux Environment
      description: Your distro and desktop environment
      placeholder: "e.g., Ubuntu 24.04 + Sway"

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this to you?
      options:
        - Nice to have
        - Important
        - Critical for my workflow
